---
# Aletheia — Docker Compose (local dev + VM deploy)
# Local:  docker compose up
# VM:     docker compose -f docker-compose.yml up -d
#
# Requires: .env file (copy from .env.example)

version: "3.9"

services:

  # ── Aletheia API ──────────────────────────────────────────────────
  aletheia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aletheia-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Hot-reload in dev: mount source
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - aletheia-net

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: aletheia-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - aletheia-net

  # ── PostgreSQL + pgvector (Phase 2) ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: aletheia-postgres
    environment:
      POSTGRES_DB: aletheia
      POSTGRES_USER: aletheia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aletheia_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - aletheia-net
    # Not required for Phase 1 — comment out to save resources
    profiles:
      - phase2

volumes:
  redis-data:
  postgres-data:

networks:
  aletheia-net:
    driver: bridge
